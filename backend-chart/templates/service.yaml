apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-chart.fullname" . }}
  labels:
    {{- include "backend-chart.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app.kubernetes.io/name: {{ include "backend-chart.name" . }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80