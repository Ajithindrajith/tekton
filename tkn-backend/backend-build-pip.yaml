apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-backend-pipeline
  namespace: tkn

spec:
  workspaces:
    - name: shared-data

  params:
    - name: repo-url

  tasks:
    - name: clone-repo
      taskRef:
        name: git-clone
      params:
        - name: repo-url
          value: "$(params.repo-url)"
      workspaces:
        - name: source
          workspace: shared-data

    - name: build-backend
      runAfter:
        - clone-repo
      taskRef:
        name: build-backend
      workspaces:
        - name: source
          workspace: shared-data
    - name: deploy
      runAfter: 
        - build-backend
      taskRef:
        name: helm-deploy
      params:
        - name: image-tag
          value: "latest"
      workspaces:
        - name: source
          workspace: shared-data     