apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-deploy
  namespace: tkn
spec:
  workspaces:
    - name: source

  params:
    - name: image-tag

  steps:
    - name: deploy
      image: alpine/helm:3.12.0
      script: |
        #!/bin/sh
        echo "Deploying Helm chart..."

        helm upgrade --install backend \
          $(workspaces.source.path)/repo/backend-chart \
          --namespace tkn \
          --set image.tag=$(params.image-tag)