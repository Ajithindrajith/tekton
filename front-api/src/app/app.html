<h2>Add Pet</h2>

<div>
  <input [(ngModel)]="name" placeholder="Pet Name">
  <input [(ngModel)]="type" placeholder="Type (Dog/Cat)">
  <input type="number" [(ngModel)]="age" placeholder="Age">
  <input [(ngModel)]="owner" placeholder="Owner Name">
  <button (click)="submitPet()">Add Pet</button>
</div>

<hr>

<h3>Pet List</h3>
<ul>
  <li *ngFor="let pet of pets">
    {{pet.name}} - {{pet.type}} - {{pet.age}} - Owner: {{pet.owner}}
  </li>
</ul>
